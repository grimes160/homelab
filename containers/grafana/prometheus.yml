# Prometheus configuration for CT103 monitoring stack
# Managed in Git: github.com/grimes160/homelab
# Deploy: pct push 103 prometheus.yml /etc/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          host: 'grafana'

  # Linux system metrics from every host in the homelab
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          host: 'grafana'
          role: 'monitoring'
      - targets: ['192.168.50.10:9100']
        labels:
          host: 'proxmox-host'
          role: 'hypervisor'
      - targets: ['192.168.50.20:9100']
        labels:
          host: 'pihole'
          role: 'dns-filter'
      - targets: ['192.168.50.21:9100']
        labels:
          host: 'unbound'
          role: 'dns-resolver'
      - targets: ['192.168.50.22:9100']
        labels:
          host: 'tailscale'
          role: 'vpn'

  # Pi-hole application metrics (via pihole-exporter)
  - job_name: 'pihole'
    static_configs:
      - targets: ['192.168.50.20:9617']
        labels:
          host: 'pihole'
